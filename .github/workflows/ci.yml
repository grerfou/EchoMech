name: EchoMech CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware (ESP-IDF)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.3
          target: esp32
          path: 01_freertos_blink

  firmware-size-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and check firmware size
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.3
          target: esp32
          path: 01_freertos_blink

      - name: Check firmware size < 1MB
        run: |
          SIZE=$(stat -c%s 01_freertos_blink/build/*.bin 2>/dev/null | sort -n | tail -1 || echo 0)
          echo "Firmware size: ${SIZE} bytes"
          [ "$SIZE" -lt 1048576 ] && echo "[OK] Size check passed" || (echo "[FAIL] Firmware too large" && exit 1)
